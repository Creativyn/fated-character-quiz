<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fated Character Quiz</title>

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <header class="header">
      <h1>Fated Character Quiz</h1>
    </header>

    <main id="main-content">
      <!-- =========================
           QUIZ SCREEN
      ========================== -->
      <section id="quiz-section" class="app-screen active">
        <form id="quiz">
          <div id="questions-container"></div>

          <div id="validation-message" role="alert"></div>

          <div class="actions">
            <button type="submit">Show Results</button>
          </div>
        </form>
      </section>

      <!-- =========================
           RESULTS SCREEN
      ========================== -->
      <section id="results-section" class="app-screen">
        <!-- CINEMATIC OVERLAY -->
        <div id="fate-overlay" class="fate-overlay hidden">
          <div class="fate-text"></div>
        </div>

        <!-- HEADER / CONTROLS -->
        <div class="results-header">
          <label class="skip-toggle">
            <input type="checkbox" id="skip-cinematic" />
            Skip cinematic reveal
          </label>
        </div>

        <!-- RESULTS OUTPUT -->
        <div id="results-container"></div>

        <!-- ACTION BUTTONS -->
        <div class="results-actions">
          <button id="home-btn" type="button">Return to Quizzes</button>
          <button id="explore-btn" type="button">Explore Characters</button>
          <button id="retake-btn" type="button">Retake Quiz</button>
          <button id="share-btn" type="button">Share</button>
          <button id="print-btn" type="button">Print</button>
        </div>
      </section>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
