<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fated Character Quiz</title>

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <header class="header">
      <h1>Fated Character Quiz</h1>
    </header>

    <main id="main-content">
      <!-- QUIZ SCREEN -->
      <section id="quiz-section" class="app-screen active">
        <form id="quiz">
          <div id="questions-container"></div>

          <div id="validation-message" role="alert"></div>

          <div class="actions">
            <button type="submit">Show Results</button>
          </div>
        </form>
      </section>

      <!-- RESULTS SCREEN -->
      <section id="results-section" class="app-screen">
        <div class="results-header">
          <h2>Your Results</h2>
          <p id="top-result"></p>
        </div>

        <div id="results-container"></div>

        <div class="results-actions">
          <button id="retake-btn" type="button">Retake</button>
          <button id="share-btn" type="button">Share</button>
          <button id="print-btn" type="button">Print</button>
        </div>
      </section>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
